services:
  # Backend API
  - type: web
    name: kabanye-space-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kabanye-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: ADMIN_SECRET_KEY
        sync: false
      - key: CALLBACK_BASE_URL
        sync: false

  # Frontend Static Site
  - type: web
    name: kabanye-space
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://kabanye-space-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: kabanye-db
    plan: free
